<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
  background: linear-gradient(-45deg, #020024, #090979, #0f3460, #16213e);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

/* Animated Gradient */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating blobs */
body::before, body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(0, 140, 255, 0.25);
  filter: blur(120px);
  border-radius: 50%;
  animation: float 10s infinite alternate ease-in-out;
}

body::after {
  right: -100px;
  bottom: -100px;
  animation-delay: 3s;
}

body::before {
  left: -100px;
  top: -100px;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(80px); }
}

/* Glass Card */
.container {
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 40px 30px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 2.8rem;
  margin-bottom: 10px;
}

p {
  opacity: 0.85;
  margin-bottom: 25px;
}

/* Countdown */
.countdown {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 30px;
}

.time-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  min-width: 70px;
  backdrop-filter: blur(10px);
}

.time-box h2 {
  font-size: 1.6rem;
}

.time-box span {
  font-size: 0.75rem;
  opacity: 0.8;
}

/* Input */
.input-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 30px;
  border: none;
  outline: none;
}

button {
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  background: #0a84ff;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0066cc;
}

/* Mobile */
@media(max-width: 600px){
  h1 { font-size: 2rem; }
  .countdown { flex-wrap: wrap; }
  .input-group { flex-direction: column; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Coming Soon 🚀</h1>
  <p>Something amazing is on the way. Stay tuned.</p>

  <div class="countdown">
    <div class="time-box">
      <h2 id="days">00</h2>
      <span>Days</span>
    </div>
    <div class="time-box">
      <h2 id="hours">00</h2>
      <span>Hours</span>
    </div>
    <div class="time-box">
      <h2 id="minutes">00</h2>
      <span>Minutes</span>
    </div>
    <div class="time-box">
      <h2 id="seconds">00</h2>
      <span>Seconds</span>
    </div>
  </div>
</div>

<script>
// Change launch date here
const launchDate = new Date("April 10, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = launchDate - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = d;
  document.getElementById("hours").innerText = h;
  document.getElementById("minutes").innerText = m;
  document.getElementById("seconds").innerText = s;

}, 1000);
</script>

</body>
</html>
